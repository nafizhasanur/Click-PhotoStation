<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Click-PhotoStation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto p-6 pt-10">
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <div class="flex justify-between items-center mb-8">
        <h1 id="welcome-text" class="text-3xl font-bold text-indigo-600"></h1>
        <a href="index.html" class="text-indigo-600 hover:text-indigo-700 font-medium">← Back to Home</a>
      </div>

      <div id="client-info" class="text-center mb-10 text-lg font-medium"></div>

      <!-- Admin Comment -->
      <div id="admin-comment" class="hidden bg-blue-50 border border-blue-200 rounded-2xl p-6 mb-8">
        <h4 class="font-semibold text-blue-700 mb-2">Admin Comment</h4>
        <p id="comment-text" class="text-gray-700"></p>
      </div>

      <!-- Action Buttons -->
      <div id="action-buttons" class="hidden grid grid-cols-3 gap-4 mb-10">
        <button onclick="confirmOrder()" class="bg-green-600 text-white py-4 rounded-2xl font-semibold">✅ Confirm</button>
        <button onclick="editOrder()" class="bg-yellow-500 text-white py-4 rounded-2xl font-semibold">✏️ Edit</button>
        <button onclick="cancelOrder()" class="bg-red-600 text-white py-4 rounded-2xl font-semibold">❌ Cancel</button>
      </div>

      <!-- Progress -->
      <div id="progress-section" class="hidden bg-gray-100 rounded-2xl p-8 mb-8">
        <h3 class="font-semibold mb-4">Project Progress</h3>
        <div class="w-full bg-gray-300 rounded-full h-5">
          <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-blue-600 h-5 rounded-full"></div>
        </div>
        <p id="progress-text" class="text-center mt-3 font-medium"></p>
      </div>

      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white border border-gray-200 rounded-2xl p-6">
          <h4 class="text-gray-600">Deadline</h4>
          <p id="deadline" class="font-semibold mt-1"></p>
          <p id="days-remain" class="text-sm text-orange-600 mt-1"></p>
        </div>
        <div class="bg-white border border-gray-200 rounded-2xl p-6">
          <h4 class="text-gray-600">Charges</h4>
          <p id="charges" class="font-semibold text-lg mt-2"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby674h-NihIdY-8fUMzaBfZG2U0vmJUIH0UbqL_N2po46zAEtBXBgtM-JJjDNWQyD6BXw/exec";

    const currentClient = JSON.parse(localStorage.getItem('currentClient'));

    if (!currentClient) {
      window.location.href = "login.html";
    } else {
      document.getElementById('welcome-text').textContent = `Welcome, ${currentClient.name || 'Client'}`;
      document.getElementById('client-info').innerHTML = `Logged in as: <strong>${currentClient.gmail}</strong>`;

      const isNewClient = currentClient.code && currentClient.code.startsWith("C");

      if (isNewClient && currentClient.status === "Pending Customer Confirmation") {
        document.getElementById('action-buttons').classList.remove('hidden');
      } else if (currentClient.status === "In Progress" || currentClient.status === "Done") {
        document.getElementById('progress-section').classList.remove('hidden');
        const progress = currentClient.progress || 0;
        document.getElementById('progress-bar').style.width = progress + "%";
        document.getElementById('progress-text').textContent = `${progress}% Completed`;
      }
    }

    function confirmOrder() {
      currentClient.status = "In Progress";
      currentClient.progress = 20;
      localStorage.setItem('currentClient', JSON.stringify(currentClient));
      location.reload();
    }

    function cancelOrder() {
      if (confirm("Cancel this order?")) {
        localStorage.removeItem('currentClient');
        window.location.href = "index.html";
      }
    }

    function editOrder() {
      alert("Edit feature coming soon...");
    }
  </script>
</body>
</html>
