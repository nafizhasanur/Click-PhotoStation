<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Click-PhotoStation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50">
  <div class="max-w-4xl mx-auto p-6 pt-10">
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <div class="flex justify-between items-center mb-8">
        <h1 id="welcome-text" class="text-3xl font-bold text-indigo-600"></h1>
        <a href="index.html" class="text-indigo-600 hover:text-indigo-700 font-medium">← Back to Home</a>
      </div>

      <div id="client-info" class="text-center mb-10 text-lg font-medium"></div>

      <!-- Admin Comment -->
      <div id="admin-comment" class="hidden bg-blue-50 border border-blue-200 rounded-2xl p-6 mb-8">
        <h4 class="font-semibold text-blue-700 mb-2">Admin Comment</h4>
        <p id="comment-text" class="text-gray-700"></p>
      </div>

      <!-- Progress -->
      <div id="progress-section" class="hidden bg-gray-100 rounded-2xl p-8 mb-8">
        <h3 class="font-semibold mb-4">Project Progress</h3>
        <div class="w-full bg-gray-300 rounded-full h-5">
          <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-blue-600 h-5 rounded-full"></div>
        </div>
        <p id="progress-text" class="text-center mt-3 font-medium"></p>
      </div>

      <!-- Final Video Link -->
      <div id="final-video-section" class="hidden bg-green-50 border border-green-200 rounded-2xl p-6 mb-8">
        <h4 class="font-semibold text-green-700 mb-3">✅ Your Final Edited Video</h4>
        <a id="final-video-link" href="#" target="_blank" class="inline-flex items-center gap-2 bg-green-600 text-white px-6 py-3 rounded-2xl hover:bg-green-700">
          📥 Download Final Video
        </a>
      </div>

      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white border border-gray-200 rounded-2xl p-6">
          <h4 class="text-gray-600">Deadline</h4>
          <p id="deadline" class="font-semibold mt-1"></p>
          <p id="days-remain" class="text-sm text-orange-600 mt-1"></p>
        </div>
        <div class="bg-white border border-gray-200 rounded-2xl p-6">
          <h4 class="text-gray-600">Charges</h4>
          <p id="charges" class="font-semibold text-lg mt-2"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwPrkgEsw01jxpiBASEd9iI90y3CnUtr-Gi71xfzqCUqIMbCjPSnEfQy9lDgr0-wBIKSw/exec";

    const currentClient = JSON.parse(localStorage.getItem('currentClient'));

    if (!currentClient) {
      window.location.href = "login.html";
    } else {
      document.getElementById('welcome-text').textContent = `Welcome, ${currentClient.name || 'Client'}`;
      document.getElementById('client-info').innerHTML = `Logged in as: <strong>${currentClient.gmail}</strong>`;

      if (currentClient.adminComment) {
        document.getElementById('admin-comment').classList.remove('hidden');
        document.getElementById('comment-text').textContent = currentClient.adminComment;
      }

      if (currentClient.status === "In Progress" || currentClient.status === "Done") {
        document.getElementById('progress-section').classList.remove('hidden');
        const progress = parseInt(currentClient.progress) || 0;
        document.getElementById('progress-bar').style.width = progress + "%";
        document.getElementById('progress-text').textContent = `${progress}% Completed`;

        if (progress >= 100 && currentClient.finalVideoLink) {
          document.getElementById('final-video-section').classList.remove('hidden');
          document.getElementById('final-video-link').href = currentClient.finalVideoLink;
        }
      }

      document.getElementById('deadline').textContent = currentClient.deadline || "N/A";
      document.getElementById('charges').textContent = `৳ ${currentClient.charges || '0'}`;
    }
  </script>
</body>
</html>
