<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Order - Click-PhotoStation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-2xl mx-auto p-6 pt-12">
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">Place New Video Editing Order</h1>
      
      <form id="order-form" class="space-y-6">
        <input type="text" id="order-name" placeholder="Your Full Name *" required class="w-full p-4 border rounded-2xl">
        <input type="email" id="order-gmail" placeholder="Your Gmail *" required class="w-full p-4 border rounded-2xl">
        <input type="tel" id="order-whatsapp" placeholder="WhatsApp Number *" required class="w-full p-4 border rounded-2xl">
        <input type="url" id="order-drive" placeholder="Google Drive Link (Raw Footage) *" required class="w-full p-4 border rounded-2xl">
        <textarea id="order-description" rows="4" placeholder="Project Details *" required class="w-full p-4 border rounded-2xl"></textarea>
        <input type="url" id="order-sample" placeholder="Sample Video Link (Optional)" class="w-full p-4 border rounded-2xl">
        <input type="date" id="order-deadline" required class="w-full p-4 border rounded-2xl">

        <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl text-lg font-semibold">
          Submit Order
        </button>
      </form>
    </div>
  </div>

  <div id="success-screen" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="text-center text-white">
      <div class="text-7xl mb-6"></div>
      <h2 class="text-4xl font-bold">Thank You!</h2>
      <p class="text-xl mt-3">Your order has been received successfully.</p>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwPrkgEsw01jxpiBASEd9iI90y3CnUtr-Gi71xfzqCUqIMbCjPSnEfQy9lDgr0-wBIKSw/exec";

    document.getElementById('order-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.innerHTML = 'Submitting...';
      btn.disabled = true;

      const orderData = {
        name: document.getElementById('order-name').value,
        gmail: document.getElementById('order-gmail').value,
        whatsapp: document.getElementById('order-whatsapp').value,
        driveLink: document.getElementById('order-drive').value,
        description: document.getElementById('order-description').value,
        sampleLink: document.getElementById('order-sample').value,
        deadline: document.getElementById('order-deadline').value
      };

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: "addNewOrder", order: orderData }),
          headers: { 'Content-Type': 'application/json' }
        });

        const result = await response.json();

        if (result.success) {
          document.getElementById('success-screen').classList.remove('hidden');
          setTimeout(() => window.location.href = "index.html", 2500);
        } else {
          alert("Error: " + (result.message || "Try again"));
        }
      } catch(e) {
        alert("Connection error. Please check your internet.");
      } finally {
        btn.innerHTML = 'Submit Order';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
