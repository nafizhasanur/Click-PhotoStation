<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login - Click-PhotoStation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10">
    <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">Client Login</h1>
    
    <input id="gmail" type="email" placeholder="Your Gmail" class="w-full p-4 mb-4 border rounded-2xl">
    <input id="code" type="password" placeholder="Secret Code" class="w-full p-4 mb-6 border rounded-2xl">

    <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-semibold">
      Login
    </button>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby674h-NihIdY-8fUMzaBfZG2U0vmJUIH0UbqL_N2po46zAEtBXBgtM-JJjDNWQyD6BXw/exec";

    async function handleLogin() {
      const gmail = document.getElementById('gmail').value.trim().toLowerCase();
      const code = document.getElementById('code').value.trim();

      if (!gmail || !code) {
        alert("Gmail and Code are required!");
        return;
      }

      try {
        const res = await fetch(SCRIPT_URL + "?action=getAllClients");
        const clients = await res.json();

        const user = clients.find(c => c.gmail.toLowerCase() === gmail && c.code === code);

        if (user) {
          localStorage.setItem('currentClient', JSON.stringify(user));
          window.location.href = "customer.html";
        } else {
          alert("Invalid Gmail or Code!\nPlease talk with Admin.");
        }
      } catch(e) {
        alert("Connection error. Please try again.");
      }
    }
  </script>
</body>
</html>
