<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Click-PhotoStation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <style>
    .flash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 2000;
      animation: flash 0.8s ease-in-out;
    }
    @keyframes flash {
      0% { opacity: 0.6; }
      40% { opacity: 0.9; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-600">Click<span class="text-gray-800">PhotoStation</span></h1>
      <div class="hidden md:flex space-x-8 text-gray-700">
        <a href="index.html" class="hover:text-indigo-600">Home</a>
        <a href="about.html" class="hover:text-indigo-600">About</a>
        <a href="portfolio.html" class="hover:text-indigo-600">Our Works</a>
        <a href="quick-photo-edit.html" class="hover:text-indigo-600 transition">Quick Photo Edit</a>
        <a href="contact.html" class="text-indigo-600 font-medium">Contact</a>
      </div>
      <button id="mobile-menu-btn" class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <div id="mobile-menu" class="hidden md:hidden bg-white shadow-lg">
    <div class="flex flex-col py-4 px-6 space-y-4">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Our Works</a>
      <a href="contact.html" class="text-indigo-600">Contact</a>
    </div>
  </div>

  <section class="py-20 bg-gray-100">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12" data-aos="fade-up">Get In Touch</h2>
      
      <div class="grid md:grid-cols-2 gap-12">
        <div data-aos="fade-right">
          <h3 class="text-2xl font-semibold mb-6">Contact Information</h3>
          <div class="space-y-6 text-gray-700">
            <p><i class="fas fa-envelope text-indigo-600 mr-3"></i> <a href="mailto:dmclickstudio@gmail.com">dmclickstudio@gmail.com</a></p>
            <p><i class="fab fa-instagram text-indigo-600 mr-3"></i> <a href="https://www.instagram.com/click_photo_station">click_photo_station</a> </p>
            </p>
            <p><i class="fab fa-facebook text-indigo-600 mr-3"></i> <a href="https://www.facebook.com/clickphotostation">Click-PhotoStation</a></p>
          </div>
        </div>

        <div data-aos="fade-left">
          <form id="contact-form" class="space-y-6">
            <input type="text" name="name" placeholder="Your Name" required class="w-full p-4 rounded-xl border focus:border-indigo-500 focus:outline-none">
            <input type="email" name="email" placeholder="Your Email" required class="w-full p-4 rounded-xl border focus:border-indigo-500 focus:outline-none">
            <textarea name="message" placeholder="Tell us about your project..." rows="6" required class="w-full p-4 rounded-xl border focus:border-indigo-500 focus:outline-none"></textarea>
            
            <button type="submit" id="submit-btn" 
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-full w-full font-medium transition text-lg">
              Send Message
            </button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Transparent Footer -->
  <footer class="bg-gray-900/80 backdrop-blur-md text-gray-300 py-8 text-center border-t border-white/10">
    <p>© 2026 Click-PhotoStation. All Rights Reserved.</p>
    <p class="text-sm mt-1">Professional Photo & Video Editing</p>
  </footer>

  <script>
    AOS.init({ duration: 1000, once: true });

    const form = document.getElementById('contact-form');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      submitBtn.innerHTML = 'Sending...';
      submitBtn.disabled = true;

      const formData = new FormData(form);

      try {
        const response = await fetch('https://formspree.io/f/mqejbpbj', {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          // Change button to green "Message Sent"
          submitBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
          submitBtn.classList.add('bg-green-600');
          submitBtn.innerHTML = 'Message Sent successfully';

          // Flash Effect
          const flash = document.createElement('div');
          flash.className = 'flash';
          document.body.appendChild(flash);

          setTimeout(() => {
            flash.remove();
          }, 900);

          // Auto redirect to home
          setTimeout(() => {
            window.location.href = "index.html";
          }, 2200);

        } else {
          alert("Something went wrong. Please try again.");
          resetButton();
        }
      } catch (error) {
        alert("Network error. Please check your connection.");
        resetButton();
      }
    });

    function resetButton() {
      submitBtn.innerHTML = 'Send Message';
      submitBtn.disabled = false;
      submitBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
      submitBtn.classList.remove('bg-green-600');
    }

    // Mobile Menu
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    mobileBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
  </script>
</body>
</html>
