<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click-PhotoStation | Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <style>
    .hero-slideshow {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }
    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }
    .slide.active {
      opacity: 1;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65));
      z-index: 1;
    }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-600">Click<span class="text-gray-800">PhotoStation</span></h1>
      
      <div class="hidden md:flex space-x-8 text-gray-700">
        <a href="index.html" class="text-indigo-600 font-medium">Home</a>
        <a href="about.html" class="hover:text-indigo-600 transition">About</a>
        <a href="portfolio.html" class="hover:text-indigo-600 transition">Our Works</a>
        <a href="contact.html" class="hover:text-indigo-600 transition">Contact</a>
      </div>
      
      <button id="mobile-menu-btn" class="md:hidden text-2xl">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden md:hidden bg-white shadow-lg">
    <div class="flex flex-col py-4 px-6 space-y-4 text-gray-700">
      <a href="index.html" class="text-indigo-600">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Our Works</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <!-- Hero Slideshow -->
  <section class="hero-slideshow flex items-center text-white">
    
    <!-- Slide 1 -->
    <div class="slide active" style="background-image: url('slideshow/slideshow\ 01.webp')"></div>
    
    <!-- Slide 2 -->
    <div class="slide active" style="background-image: url('slideshow/slideshow\ 02.webp')"></div>
    
    <!-- Slide 3 -->
    <div class="slide active" style="background-image: url('slideshow/slideshow\ 03.webp')"></div>
    
    <!-- Slide 4 -->
    <div class="slide active" style="background-image: url('slideshow/slideshow\ 04.webp')"></div>

    <div class="hero-overlay"></div>

    <!-- Content -->
    <div class="relative z-10 max-w-7xl mx-auto px-6 text-center">
      <h2 class="text-5xl md:text-6xl font-bold mb-6" data-aos="fade-up">
        Moments Captured.<br>Stories Crafted.
      </h2>
      <p class="text-xl md:text-2xl mb-8 text-gray-200" data-aos="fade-up" data-aos-delay="200">
        Professional Photo & Video Editing <br>
          Reels • Shorts • Motion Design
      </p>
      <div class="flex justify-center gap-4">
        <a href="portfolio.html" class="bg-indigo-600 hover:bg-indigo-700 px-8 py-4 rounded-full text-lg font-medium transition">
          View Our Works
        </a>
        <a href="contact.html" class="border-2 border-white hover:bg-white hover:text-gray-900 px-8 py-4 rounded-full text-lg font-medium transition">
          Hire Us
        </a>
      </div>
    </div>
  </section>

  <script>
    AOS.init({ duration: 1000, once: true });

    // Slideshow Script
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');

    function showSlide(index) {
      slides.forEach(slide => slide.classList.remove('active'));
      slides[index].classList.add('active');
    }

    function nextSlide() {
      currentSlide = (currentSlide + 1) % slides.length;
      showSlide(currentSlide);
    }

    // Auto slide every 5 seconds
    setInterval(nextSlide, 5000);

    // Mobile Menu
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    mobileBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
  </script>
      <!-- Transparent Footer -->
  <footer class="bg-gray-900/80 backdrop-blur-md text-gray-300 py-8 text-center border-t border-white/10">
    <p>© 2026 Click-PhotoStation. All Rights Reserved.</p>
    <p class="text-sm mt-1">Professional Photo & Video Editing</p>
  </footer>
</body>
</html>
